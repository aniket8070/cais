<!DOCTYPE html>
<html>
<head>

<title>CAIS Login</title>

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(120deg,#6366f1,#22c55e);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.login-box{
background:white;
padding:40px;
border-radius:12px;
width:320px;
text-align:center;
box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

.logo{
width:50px;
margin-bottom:10px;
}

h2{
margin-bottom:20px;
}

input{
width:100%;
padding:10px;
margin-top:10px;
border:1px solid #ddd;
border-radius:6px;
}

button{
width:100%;
padding:10px;
margin-top:15px;
background:#4f46e5;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
}

button:hover{
background:#4338ca;
}

</style>

</head>

<body>

<div class="login-box">

<img src="/static/logo.png" class="logo">

<h2>CAIS Login</h2>

<form method="post">

{% csrf_token %}

<input type="text" name="username" placeholder="Username">

<input type="password" name="password" placeholder="Password">

<button type="submit">Login</button>

</form>

</div>

</body>

</html>
